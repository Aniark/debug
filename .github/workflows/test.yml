#某些老旧的bios可能不支持直接解压镜像到U盘安装，使用ventoy或rufus创建启动盘可解
name: test
on: [workflow_dispatch]
jobs:
  test:
    runs-on: windows-2022
    env:
      TZ: Asia/Shanghai
    steps:
    - uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64
        sdk: 10.0.17763.0
        toolset: 14.0
        
    - name: git clone
      run: |
        git clone https://github.com/kunitsyn/ogg-acm-codec.git
        cd ogg-acm-codec/src/vorbisacm
        devenv vorbisacm.sln
        ls
